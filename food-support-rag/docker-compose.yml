version: '3.8'

services:
  # FastAPI RAG Application Server
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fastapi_rag_app
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Cổng chạy ứng dụng
      - PORT=8000
      # Hệ thống sẽ tự động dùng QDRANT_URL và QDRANT_API_KEY được cấu hình trong file .env
    restart: always
